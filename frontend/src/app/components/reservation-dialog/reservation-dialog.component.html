<h2 mat-dialog-title>Reserve Device</h2>
<mat-dialog-content>
  <form [formGroup]="form" class="reservation-form">
    <mat-form-field appearance="outline">
      <mat-label>Duration (seconds)</mat-label>
      <input matInput type="number" formControlName="duration_seconds" />
      <mat-hint *ngIf="!isUnlimited">Min 10s, Max 86400s (24h) — {{ durationMinutes }} minutes</mat-hint>
      <mat-error *ngIf="form.get('duration_seconds')?.hasError('required')">Duration is required</mat-error>
      <mat-error *ngIf="form.get('duration_seconds')?.hasError('min')">Minimum 10 seconds</mat-error>
      <mat-error *ngIf="form.get('duration_seconds')?.hasError('max')">Maximum 86400 seconds (24h)</mat-error>
    </mat-form-field>
    <mat-checkbox
      *ngIf="allowUnlimited"
      formControlName="unlimited"
      (change)="onUnlimitedChange()"
      class="unlimited-checkbox">
      Unlimited reservation (no expiry)
    </mat-checkbox>
  </form>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button (click)="onCancel()">Cancel</button>
  <button mat-raised-button color="primary" (click)="onSubmit()" [disabled]="!isUnlimited && !form.valid">
    <mat-icon>lock_clock</mat-icon>
    Reserve
  </button>
</mat-dialog-actions>
