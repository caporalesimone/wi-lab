<div class="dialog-title-row">
  <h2 mat-dialog-title>Reserve Device</h2>
  <span *ngIf="!isUnlimited" class="duration-badge">
    <mat-icon>schedule</mat-icon>
    {{ currentDurationFormatted }}
  </span>
</div>
<mat-dialog-content>
  <form [formGroup]="form" class="reservation-form">
    <mat-form-field appearance="outline">
      <mat-label>Duration (seconds)</mat-label>
      <input matInput type="number" formControlName="duration_seconds" />
      <mat-error *ngIf="form.get('duration_seconds')?.hasError('required')">Required</mat-error>
      <mat-error *ngIf="form.get('duration_seconds')?.hasError('min')">Min {{ minSeconds }}s</mat-error>
      <mat-error *ngIf="form.get('duration_seconds')?.hasError('max')">Max {{ maxSeconds }}s</mat-error>
    </mat-form-field>
    <div *ngIf="!isUnlimited" class="duration-hint">
      *Valid value from {{ minSeconds }}s to {{ maxSeconds }}s ( {{ formatDuration(maxSeconds) }} )
    </div>
    <mat-checkbox
      *ngIf="allowUnlimited"
      formControlName="unlimited"
      (change)="onUnlimitedChange()"
      class="unlimited-checkbox">
      Unlimited reservation (no expiry)
    </mat-checkbox>
  </form>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button (click)="onCancel()">Cancel</button>
  <button mat-raised-button color="primary" (click)="onSubmit()" [disabled]="!isUnlimited && !form.valid">
    <mat-icon>lock_clock</mat-icon>
    Reserve
  </button>
</mat-dialog-actions>
