<div class="app-container">
  <mat-toolbar color="primary">
    <mat-icon>wifi</mat-icon>
    <span class="toolbar-title">{{ title }}</span>
    <span class="toolbar-spacer"></span>
    <a mat-icon-button href="/docs" target="_blank" matTooltip="Swagger UI — Interactive API docs">
      <mat-icon>description</mat-icon>
    </a>
    <a mat-icon-button href="/redoc" target="_blank" matTooltip="ReDoc — API reference">
      <mat-icon>menu_book</mat-icon>
    </a>
    <span class="toolbar-divider"></span>
    <button mat-icon-button (click)="openTokenDialog()" matTooltip="Change auth token"
            (mouseenter)="lockIcon='lock_open'" (mouseleave)="lockIcon='lock'">
      <mat-icon>{{ lockIcon }}</mat-icon>
    </button>
  </mat-toolbar>

  <div class="content">
    <!-- Loading spinner -->
    <div *ngIf="loading" class="loading-container">
      <mat-spinner></mat-spinner>
      <p>Loading...</p>
    </div>

    <!-- Connection error -->
    <div *ngIf="error" class="error-container">
      <mat-icon color="warn">error</mat-icon>
      <p>{{ error }}</p>
      <button mat-raised-button color="primary" (click)="loadStatus()">
        <mat-icon>refresh</mat-icon>
        Retry
      </button>
    </div>

    <!-- Main content (not loading, no error) -->
    <div *ngIf="!loading && !error">

      <!-- Summary bar -->
      <div class="summary-bar">
        <span class="summary-label">
          {{ slots.length }} interface{{ slots.length !== 1 ? 's' : '' }} &mdash;
          {{ availableCount }} available
        </span>

        <!-- Capacity error message -->
        <div *ngIf="capacityError" class="capacity-error">
          <mat-icon color="warn">schedule</mat-icon>
          <span>All devices busy. Next available in <strong>{{ capacityCountdown }}</strong>s</span>
        </div>

        <button mat-raised-button color="primary" class="reserve-button" (click)="openReservationDialog()"
          [disabled]="availableCount === 0">
          <mat-icon>lock_clock</mat-icon>
          Reserve Device
        </button>

        <button mat-raised-button class="release-all-button"
          [color]="reservedCount > 0 ? 'warn' : undefined"
          [disabled]="reservedCount === 0"
          (click)="releaseAll()">
          <mat-icon>delete_sweep</mat-icon>
          Release All
        </button>
      </div>

      <!-- All interface cards -->
      <div class="networks-container">
        <app-network-card
          *ngFor="let slot of slots"
          [slot]="slot"
          (released)="onReservationReleased(slot.interface)">
        </app-network-card>
      </div>

    </div>
  </div>
</div>
